<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danske Landsholdsspillere – Interaktivt Kort | DBU Landsholdsdatabasen</title>
  <meta name="description" content="Udforsk alle danske landsholdsspillere på et interaktivt kort. Se fødselssteder, første klubber, statistik og mere for over 1100 spillere fra 1850 til i dag.">
  <meta name="keywords" content="danske landsholdsspillere, DBU, dansk fodbold, landshold, fodboldkort, Danmark, fodboldhistorie">
  <meta name="author" content="Aksel Bandersen">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Danske Landsholdsspillere – Interaktivt Kort">
  <meta property="og:description" content="Udforsk alle danske landsholdsspillere på et interaktivt kort. Fødselssteder, klubber og statistik for over 1100 spillere.">
  <meta property="og:locale" content="da_DK">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Danske Landsholdsspillere – Interaktivt Kort">
  <meta name="twitter:description" content="Udforsk alle danske landsholdsspillere på et interaktivt kort. Fødselssteder, klubber og statistik for over 1100 spillere.">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin="">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Mobile toggle button -->
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Åbn filtre">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span>Filtre</span>
  </button>

  <div class="app-container">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h1>Danske Landsholdsspillere</h1>
        <button id="sidebar-close" class="sidebar-close" aria-label="Luk filtre">&times;</button>
      </div>

      <div class="stats-box">
        <span class="stats-number" id="player-count">0</span>
        <span class="stats-label">spillere vist</span>
      </div>

      <!-- Vis-type -->
      <div class="control-group">
        <label class="control-label">Vis</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="map_type" value="club" checked>
            <span class="radio-custom"></span>
            Første klub
          </label>
          <label class="radio-option">
            <input type="radio" name="map_type" value="birth">
            <span class="radio-custom"></span>
            Fødselssteder
          </label>
          <label class="radio-option">
            <input type="radio" name="map_type" value="region">
            <span class="radio-custom"></span>
            Regioner
          </label>
        </div>
      </div>

      <!-- Køn -->
      <div class="control-group">
        <label class="control-label">Køn</label>
        <div class="radio-group">
          <label class="radio-option">
            <input type="radio" name="gender" value="alle" checked>
            <span class="radio-custom"></span>
            Alle
          </label>
          <label class="radio-option">
            <input type="radio" name="gender" value="mand">
            <span class="radio-custom"></span>
            Mænd
          </label>
          <label class="radio-option">
            <input type="radio" name="gender" value="kvinde">
            <span class="radio-custom"></span>
            Kvinder
          </label>
        </div>
      </div>

      <!-- Fødselsår -->
      <div class="control-group">
        <label class="control-label">Fødselsår: <span id="birth-year-range-label">1850 – 2010</span></label>
        <div class="range-slider">
          <input type="range" id="birth-year-min" class="slider slider-dual" min="1850" max="2010" value="1850" step="5">
          <input type="range" id="birth-year-max" class="slider slider-dual" min="1850" max="2010" value="2010" step="5">
        </div>
        <div class="slider-labels">
          <span>1850</span>
          <span>2010</span>
        </div>
      </div>

      <!-- Antal kampe -->
      <div class="control-group">
        <label class="control-label">Antal kampe: <span id="matches-range-label">0 – 250</span></label>
        <div class="range-slider">
          <input type="range" id="matches-min" class="slider slider-dual" min="0" max="250" value="0" step="1">
          <input type="range" id="matches-max" class="slider slider-dual" min="0" max="250" value="250" step="1">
        </div>
        <div class="slider-labels">
          <span>0</span>
          <span>250</span>
        </div>
      </div>

      <!-- Min. spillere per klub (kun i klub-visning) -->
      <div class="control-group" id="club-players-group">
        <label class="control-label">Min. spillere pr. klub: <span id="club-players-label">1</span></label>
        <div class="range-slider-single">
          <input type="range" id="min-club-players" class="slider slider-single"
                 min="1" max="20" value="1" step="1">
        </div>
        <div class="slider-labels">
          <span>1</span>
          <span>20+</span>
        </div>
      </div>

      <!-- Søgning -->
      <div class="control-group">
        <label class="control-label">Søg efter spiller eller klub</label>
        <input type="text" id="search" class="text-input" placeholder="Indtast navn eller klub...">
      </div>

      <hr class="divider">

      <!-- Lokationssøgning -->
      <div class="control-group">
        <label class="control-label">Find sted på kort</label>
        <div class="search-row">
          <input type="text" id="location-search" class="text-input" placeholder="By eller adresse...">
          <button id="search-location-btn" class="btn-primary">Søg</button>
        </div>
      </div>

      <hr class="divider">

      <div class="control-group">
        <button id="show-missing-btn" class="btn-secondary">Vis spillere med manglende data</button>
      </div>

      <div class="sidebar-footer"></div>
    </aside>

    <!-- Missing players modal -->
    <div id="missing-modal" class="modal-overlay">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Spillere med manglende data</h2>
          <button id="missing-close" class="modal-close">&times;</button>
        </div>
        <div class="missing-controls">
          <span class="missing-count-label"><strong id="missing-count">0</strong> spillere</span>
          <input type="text" id="missing-search" class="text-input missing-search" placeholder="Søg navn...">
          <select id="missing-filter-gender" class="missing-select">
            <option value="alle">Alle køn</option>
            <option value="mand">Mænd</option>
            <option value="kvinde">Kvinder</option>
          </select>
          <select id="missing-filter-type" class="missing-select">
            <option value="alle">Al manglende data</option>
            <option value="birth">Mangler fødested</option>
            <option value="club">Mangler klub</option>
          </select>
          <a href="https://docs.google.com/forms/d/e/1FAIpQLSfihPXtuif_-GwYUC0R-JG7sMlCsVgpl1JfWvsUvqoW3EYMFw/viewform"
             target="_blank" rel="noopener" class="missing-feedback-btn">Indsend rettelse/feedback</a>
        </div>
        <div class="modal-body">
          <table id="missing-table" class="missing-table">
            <thead>
              <tr>
                <th data-col="name" class="sortable">Navn ↕</th>
                <th>Fødselsted</th>
                <th>Første klub</th>
                <th>Wikipedia</th>
                <th>DBU ID</th>
                <th data-col="gender" class="sortable">Køn ↕</th>
                <th data-col="matches" class="sortable">Kampe ↕</th>
                <th data-col="goals" class="sortable">Mål ↕</th>
              </tr>
            </thead>
            <tbody id="missing-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Map -->
    <main class="map-container">
      <div id="map"></div>
    </main>
  </div>

  <!-- Floating correction button -->
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSfihPXtuif_-GwYUC0R-JG7sMlCsVgpl1JfWvsUvqoW3EYMFw/viewform"
     target="_blank" rel="noopener" class="correction-fab" aria-label="Indsend rettelse">
    <svg width="15" height="15" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <path d="M13.586 3.586a2 2 0 112.828 2.828l-9.5 9.5a2 2 0 01-.878.513l-3 .75a.5.5 0 01-.607-.607l.75-3a2 2 0 01.513-.878l9.5-9.5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <span>Indsend rettelse/feedback</span>
  </a>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""></script>

  <!-- App JS -->
  <script src="js/app.js"></script>
</body>
</html>
